<!doctype html>
<html lang="es-AR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calendario Plan</title>

<style>
body { font-family: Arial, sans-serif; margin: 30px; }
h1 { margin-bottom: 10px; }

.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  max-width: 1100px;
}

.dow {
  font-weight: bold;
  text-align: center;
  padding: 6px 0;
}

.cell {
  border: 1px solid #ccc;
  border-radius: 10px;
  min-height: 130px;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  background: white;
}

.muted { opacity: 0.3; }

.daynum {
  font-weight: bold;
  font-size: 14px;
}

.items {
  margin: 0;
  padding-left: 16px;
  font-size: 12px;
  line-height: 1.3;
}

.tipo-i {
  background-color: #c8f7c5; /* verde suave */
  border-color: #2ecc71;
}

.tipo-mt {
  background-color: #fff5c4; /* amarillo suave */
  border-color: #f1c40f;
}

.today {
  border: 2px solid #00bfff;
  background-color: #e6f7ff;
  box-shadow: 0 0 0 2px rgba(0,191,255,0.15);
}

.tipo-martin {
  background-color: #c8f7c5;
  border-color: #2ecc71;
}

.tipo-paula {
  background-color: #e9d5ff;
  border-color: #8b5cf6;
}

.today {
  position: relative;
  box-shadow: 0 0 0 3px #00bfff;
}


</style>
</head>

<body>

<h1 id="monthLabel"></h1>
<div class="grid" id="calendar"></div>



<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz1KT8pzPLxq4-k7DnjugfYvMeEk2qnraY8DaxS9oQuHtTclj1wycrcLlijE8ECfcBvWw/exec";

const calendar = document.getElementById("calendar");
const monthLabel = document.getElementById("monthLabel");

const monthNames = ["Enero","Febrero","Marzo","Abril","Mayo","Junio",
"Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

const dow = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];

const pad = n => String(n).padStart(2,"0");
const ymd = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

let planData = {};

async function cargarDatos() {
  const res = await fetch(APPS_SCRIPT_URL);
  planData = await res.json();
}

function renderCalendar() {

  calendar.innerHTML = "";

  dow.forEach(d => {
    const div = document.createElement("div");
    div.className = "dow";
    div.textContent = d;
    calendar.appendChild(div);
  });

  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();

  monthLabel.textContent = monthNames[month] + " " + year;

  const firstDay = new Date(year, month, 1);
  const firstDow = (firstDay.getDay() + 6) % 7;
  const startDate = new Date(year, month, 1 - firstDow);

  for (let i = 0; i < 42; i++) {
    const d = new Date(startDate);
    d.setDate(startDate.getDate() + i);

    const key = ymd(d);
    const texts = planData[key] || [];

    const cell = document.createElement("div");
    cell.className = "cell";
    if (d.getMonth() !== month) cell.classList.add("muted");


// 🔵 Resaltar día actual
const today = new Date();
if (
  d.getDate() === today.getDate() &&
  d.getMonth() === today.getMonth() &&
  d.getFullYear() === today.getFullYear()
) {
  cell.classList.add("today");
}

  // 🎯 COLOR SEGÚN CONTENIDO (I prioridad sobre M/MT)
const cleanTexts = texts.map(t => String(t).trim().toUpperCase());

// 🎯 COLOR SEGÚN PERSONA
const lowerTexts = texts.map(t => String(t).trim().toLowerCase());

const tieneMartin = lowerTexts.some(t => t.includes("martin"));
const tienePaula  = lowerTexts.some(t => t.includes("paula"));

if (tieneMartin) {
  cell.classList.add("tipo-martin");
} else if (tienePaula) {
  cell.classList.add("tipo-paula");
}

    const dayNum = document.createElement("div");
    dayNum.className = "daynum";
    dayNum.textContent = d.getDate();
    cell.appendChild(dayNum);

    if (texts.length > 0) {
      const ul = document.createElement("ul");
      ul.className = "items";

      texts.forEach(t => {
        const li = document.createElement("li");
        li.textContent = t;
        ul.appendChild(li);
      });

      cell.appendChild(ul);
    }

    calendar.appendChild(cell);
  }
}

(async function init(){
  try {
    await cargarDatos();
  } catch(e) {
    console.error("Error cargando datos", e);
  }
  renderCalendar();
})();
</script>

</body>
</html>
