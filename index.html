<!doctype html>
<html lang="es-AR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calendario Plan</title>

<style>
  * { box-sizing: border-box; }

  :root{
    --gap: 8px;
    --pagePad: 16px;
    --headerH: 52px; /* espacio estimado del título */
    --dowH: 28px;    /* alto de encabezado de días */
  }

  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: var(--pagePad);
    height: 100vh;
    overflow: hidden; /* clave: no scroll, entra todo */
    background: #fff;
  }

  h1 {
    height: var(--headerH);
    margin: 0;
    display: flex;
    align-items: center;
    font-size: 20px;
  }

  .grid {
    width: 100%;
    max-width: 1100px;
    margin: 0 auto;

    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: var(--gap);

    /* altura total disponible para TODO el calendario */
    height: calc(100vh - (var(--pagePad) * 2) - var(--headerH));
  }

  .dow {
    font-weight: 700;
    text-align: center;
    padding: 6px 0;
    height: var(--dowH);
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 6 filas de días (42 celdas) */
  .cell {
    border: 1px solid #ccc;
    border-radius: 10px;
    padding: 8px;
    background: white;

    display: flex;
    flex-direction: column;
    gap: 6px;

    overflow: hidden;  /* evita desborde */
    min-height: 0;     /* importante para flex + overflow */
  }

  .muted { opacity: 0.3; }

  .daynum {
    font-weight: 800;
    font-size: 14px;
    line-height: 1;
    flex: 0 0 auto;
  }

  .items {
    margin: 0;
    padding-left: 16px;
    font-size: 12px;
    line-height: 1.25;

    /* permite que el contenido se recorte con elegancia */
    overflow: hidden;
    min-height: 0;

    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 5; /* desktop: hasta 5 líneas */
  }

  /* Colores por persona */
  .tipo-martin { background-color: #c8f7c5; border-color: #2ecc71; }
  .tipo-paula  { background-color: #e9d5ff; border-color: #8b5cf6; }

  /* Hoy: NO pisa fondo, solo resalta */
  .today {
    position: relative;
    box-shadow: 0 0 0 3px #00bfff;
  }

  /* ===== Responsive fino para celular ===== */
  @media (max-width: 600px) {
    :root{
      --gap: 6px;
      --pagePad: 12px;
      --headerH: 44px;
      --dowH: 24px;
    }

    h1 { font-size: 16px; }

    .cell {
      padding: 6px;
      border-radius: 12px;
    }

    .daynum { font-size: 13px; }

    .items {
      font-size: 11px;
      -webkit-line-clamp: 3; /* mobile: menos líneas para que entre el mes sí o sí */
      padding-left: 14px;
    }
  }
</style>
</head>

<body>

<h1 id="monthLabel"></h1>
<div class="grid" id="calendar"></div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz1KT8pzPLxq4-k7DnjugfYvMeEk2qnraY8DaxS9oQuHtTclj1wycrcLlijE8ECfcBvWw/exec";

const calendar = document.getElementById("calendar");
const monthLabel = document.getElementById("monthLabel");

const monthNames = ["Enero","Febrero","Marzo","Abril","Mayo","Junio",
"Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

const dow = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];

const pad = n => String(n).padStart(2,"0");
const ymd = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

let planData = {};

async function cargarDatos() {
  const res = await fetch(APPS_SCRIPT_URL, { cache: "no-store" });
  planData = await res.json();
}

function mondayIndex(date){ return (date.getDay() + 6) % 7; }

function renderCalendar() {
  calendar.innerHTML = "";

  // Encabezados
  dow.forEach(d => {
    const div = document.createElement("div");
    div.className = "dow";
    div.textContent = d;
    calendar.appendChild(div);
  });

  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  monthLabel.textContent = monthNames[month] + " " + year;

  // Inicio del grid (lunes de la semana donde cae el día 1)
  const firstDay = new Date(year, month, 1);
  firstDay.setHours(12,0,0,0);
  const firstDow = mondayIndex(firstDay);
  const startDate = new Date(year, month, 1 - firstDow);
  startDate.setHours(12,0,0,0);

  const today = new Date();
  today.setHours(12,0,0,0);

  // 42 celdas (6 semanas)
  for (let i = 0; i < 42; i++) {
    const d = new Date(startDate);
    d.setDate(startDate.getDate() + i);

    const key = ymd(d);
    const texts = planData[key] || [];

    const cell = document.createElement("div");
    cell.className = "cell";
    if (d.getMonth() !== month) cell.classList.add("muted");

    // Hoy (celeste, sin pisar fondo)
    if (
      d.getDate() === today.getDate() &&
      d.getMonth() === today.getMonth() &&
      d.getFullYear() === today.getFullYear()
    ) {
      cell.classList.add("today");
    }

    // Color por persona
    const lowerTexts = texts.map(t => String(t).trim().toLowerCase());
    const tieneMartin = lowerTexts.some(t => t.includes("martin"));
    const tienePaula  = lowerTexts.some(t => t.includes("paula"));

    if (tieneMartin) cell.classList.add("tipo-martin");
    else if (tienePaula) cell.classList.add("tipo-paula");

    const dayNum = document.createElement("div");
    dayNum.className = "daynum";
    dayNum.textContent = d.getDate();
    cell.appendChild(dayNum);

    if (texts.length > 0) {
      const ul = document.createElement("ul");
      ul.className = "items";

      texts.forEach(t => {
        const li = document.createElement("li");
        li.textContent = t;
        ul.appendChild(li);
      });

      cell.appendChild(ul);
    }

    calendar.appendChild(cell);
  }

  // Ajuste fino: seteamos altura de cada celda para entrar exacto
  // (altura total grid - fila dow) / 6 semanas, restando gaps.
  requestAnimationFrame(() => {
    const grid = calendar; // .grid
    const styles = getComputedStyle(grid);
    const gap = parseFloat(styles.gap) || 0;

    const gridHeight = grid.clientHeight;
    const dowHeight = Array.from(grid.children).slice(0,7).reduce((max, el) => Math.max(max, el.clientHeight), 0);

    const available = gridHeight - dowHeight - (gap * 6); // 6 gaps verticales entre 7 filas (dow + 6 semanas)
    const cellH = Math.floor(available / 6);

    // aplicar a las 42 celdas (después de los 7 headers)
    const cells = Array.from(grid.children).slice(7);
    cells.forEach(c => { c.style.height = cellH + "px"; });
  });
}

(async function init(){
  try { await cargarDatos(); }
  catch(e) { console.error("Error cargando datos", e); }
  renderCalendar();
})();

// Recalcular al rotar/cambiar tamaño
window.addEventListener("resize", () => renderCalendar());
</script>

</body>
</html>
